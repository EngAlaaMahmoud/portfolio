<header class="fixed inset-x-0 top-0 z-50">
  <div class="mx-auto max-w-6xl px-4 pt-3 sm:px-6 lg:px-8">
    <div class="nav-shell" [class.nav-shell-scrolled]="scrolled">
      <a href="#home" class="flex items-center gap-3" aria-label="Back to home section" (click)="closeMenu()">
        <span class="brand-mark">AM</span>
        <div class="min-w-0">
          <p class="truncate text-sm font-semibold text-[color:var(--text)]">{{ brandName() }}</p>
          <p class="hidden truncate text-xs text-[color:var(--muted)] sm:block">{{ brandTitle() }}</p>
        </div>
      </a>

      <nav class="hidden items-center gap-1 lg:flex" aria-label="Primary navigation">
        @for (item of navItems(); track item.sectionId) {
          <a class="nav-link" [href]="'#' + item.sectionId" [attr.aria-label]="'Jump to ' + item.label + ' section'">{{ item.label }}</a>
        }
      </nav>

      <div class="flex items-center gap-2">
        <button
          type="button"
          class="theme-toggle"
          [attr.aria-label]="theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
          (click)="themeToggled.emit()"
        >
          @if (theme() === 'dark') {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 3v2.25M12 18.75V21M4.5 12H2.25M21.75 12H19.5M5.99 5.99l1.59 1.59M18.42 18.42l-1.59-1.59M18.01 5.99l-1.59 1.59M7.58 18.42l-1.59-1.59M15.75 12a3.75 3.75 0 1 1-7.5 0a3.75 3.75 0 0 1 7.5 0Z"
              />
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12.79A9 9 0 0 1 11.21 3a7.5 7.5 0 1 0 9.79 9.79Z" />
            </svg>
          }
        </button>

        <a
          [href]="githubUrl()"
          target="_blank"
          rel="noreferrer"
          class="btn-secondary github-link px-3 py-2 text-[0.88rem] font-bold"
          aria-label="Open GitHub profile"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 2C6.48 2 2 6.58 2 12.23c0 4.52 2.87 8.36 6.84 9.71.5.1.68-.22.68-.49 0-.24-.01-1.05-.01-1.9-2.78.62-3.37-1.21-3.37-1.21-.46-1.19-1.11-1.51-1.11-1.51-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.89 1.57 2.34 1.12 2.91.85.09-.66.35-1.12.63-1.38-2.22-.26-4.55-1.15-4.55-5.12 0-1.13.39-2.05 1.03-2.78-.1-.26-.45-1.31.1-2.72 0 0 .84-.28 2.75 1.06A9.3 9.3 0 0 1 12 6.84c.85 0 1.71.12 2.51.37 1.9-1.34 2.74-1.06 2.74-1.06.55 1.41.2 2.46.1 2.72.64.73 1.03 1.65 1.03 2.78 0 3.98-2.34 4.85-4.57 5.11.36.32.68.95.68 1.92 0 1.39-.01 2.5-.01 2.84 0 .27.18.59.69.49A10.24 10.24 0 0 0 22 12.23C22 6.58 17.52 2 12 2Z"
            />
          </svg>
          <span class="hidden sm:inline">GitHub</span>
        </a>

        <button
          type="button"
          class="menu-toggle lg:hidden"
          [attr.aria-label]="menuOpen() ? 'Close navigation menu' : 'Open navigation menu'"
          [attr.aria-expanded]="menuOpen()"
          [attr.aria-controls]="menuId"
          aria-haspopup="menu"
          (click)="toggleMenu()"
        >
          @if (!menuOpen()) {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16M4 12h16M4 17h16" />
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 6 12 12M18 6 6 18" />
            </svg>
          }
        </button>
      </div>
    </div>

    @if (menuOpen()) {
      <div class="surface-card mt-3 overflow-hidden p-3 lg:hidden">
        <nav [id]="menuId" class="flex flex-col gap-1" aria-label="Mobile navigation">
          @for (item of navItems(); track item.sectionId) {
            <a
              class="mobile-link"
              [href]="'#' + item.sectionId"
              [attr.aria-label]="'Jump to ' + item.label + ' section'"
              (click)="closeMenu()"
            >
              {{ item.label }}
            </a>
          }
        </nav>

        <a
          [href]="githubUrl()"
          target="_blank"
          rel="noreferrer"
          class="btn-primary mt-4 w-full"
          aria-label="Open GitHub profile"
          (click)="closeMenu()"
        >
          Open GitHub
        </a>
      </div>
    }
  </div>
</header>
