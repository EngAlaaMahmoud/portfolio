<div class="min-h-screen overflow-x-hidden">
  <app-navbar
    [brandName]="portfolio.profile.name"
    [brandTitle]="portfolio.profile.title"
    [navItems]="portfolio.navItems"
    [githubUrl]="portfolio.contact.githubUrl"
    [theme]="theme()"
    (themeToggled)="toggleTheme()"
  />

  <main>
    <app-hero
      [hero]="portfolio.hero"
      [profile]="portfolio.profile"
      [highlights]="portfolio.highlights"
    />

    <app-skills [skills]="portfolio.skills" />
    <app-experience [experiences]="portfolio.experiences" />
    <app-projects [projects]="portfolio.projects" />
    <app-education [education]="portfolio.education" />
    <app-contact [contact]="portfolio.contact" />
  </main>

  <app-footer
    [name]="portfolio.profile.name"
    [title]="portfolio.profile.title"
    [year]="currentYear"
    [githubUrl]="portfolio.contact.githubUrl"
  />
</div>
